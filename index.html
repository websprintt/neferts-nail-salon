<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    
    <!-- Título Principal para SEO (Ciudad Real, Manicura, Salón de Uñas) -->
    <title>Nefert's Nail Salon | Uñas, Manicura y Pedicura en Ciudad Real</title>
    
    <!-- Meta descripción principal enfocada en SEO local -->
    <meta name="description" content="¿Buscas el mejor salón de uñas en Ciudad Real? En Nefert's Nail Salon somos especialistas en manicura premium, uñas de gel, pedicura spa y nail art de diseño exclusivo. ¡Calcula tu presupuesto online de forma instantánea!" />

    <!-- Open Graph (WhatsApp, Telegram, Facebook, Instagram) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nefert's Nail Salon | Manicura Premium y Arte en Uñas" />
    <meta property="og:description" content="Tu centro de estética de uñas de confianza en Ciudad Real. Reserva tu cita para manicura exclusiva, pedicura spa y decoraciones personalizadas. ¡Calcula tu presupuesto!" />
    
    <!-- 
      IMPORTANTE PARA WHATSAPP / TELEGRAM:
      WhatsApp exige que la URL de la imagen de miniatura sea ABSOLUTA (comenzando con https://).
      Cuando subas tu web a GitHub Pages, cambia el valor de abajo por tu enlace final, por ejemplo:
      content="https://websprintt.github.io/tu-repositorio/share-thumbnail.png"
    -->
    <meta property="og:image" content="share-thumbnail.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card (Vista previa en X/Twitter) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nefert's Nail Salon | Especialistas en Uñas en Ciudad Real" />
    <meta name="twitter:description" content="Salón de uñas premium. Especialistas en manicura, uñas de gel, pedicura spa y nail art. Visítanos en Ciudad Real o calcula tu presupuesto online." />
    <meta name="twitter:image" content="share-thumbnail.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
